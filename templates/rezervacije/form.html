{% extends "base.html" %}
{% block content %}
<div class="card card-soft">
    <div class="card-body">
    <h2 class="h4 mb-3">{% if rezervacija %}Uredi rezervaciju{% else %}Nova rezervacija{% endif %}</h2>
    {% if sale|length == 0 %}
        <p>Prvo je potrebno unijeti barem jednu salu.</p>
        <a class="btn btn-primary" href="{{ url_for('sale_create') }}">Dodaj salu</a>
    {% else %}
    <form method="post" class="row g-3">
        <div class="col-md-6">
            <label class="form-label" for="sala_id">Sala</label>
            <select class="form-select" id="sala_id" name="sala_id" required>
                {% for s in sale %}
                    <option value="{{ s.id }}" data-cijena="{{ s.cijena }}" {% if rezervacija and rezervacija.sala_id == s.id %}selected{% endif %}>
                        {{ s.naziv }} ({{ s.lokacija }})
                    </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="datum">Datum</label>
            <input class="form-control" id="datum" type="date" name="datum" required value="{{ rezervacija.datum if rezervacija else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="mladenka">Ime i prezime mladenke</label>
            <input class="form-control" id="mladenka" name="ime_i_prezime_mladenke" required value="{{ rezervacija.ime_i_prezime_mladenke if rezervacija else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="mladozenja">Ime i prezime mladozenje</label>
            <input class="form-control" id="mladozenja" name="ime_i_prezime_mladozenje" required value="{{ rezervacija.ime_i_prezime_mladozenje if rezervacija else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="kontakt_mladenka">Kontakt mladenka</label>
            <input class="form-control" id="kontakt_mladenka" name="kontakt_mladenka" required value="{{ rezervacija.kontakt_mladenka if rezervacija else '' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label" for="kontakt_mladozenja">Kontakt mladozenja</label>
            <input class="form-control" id="kontakt_mladozenja" name="kontakt_mladozenja" required value="{{ rezervacija.kontakt_mladozenja if rezervacija else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="broj_gostiju">Broj gostiju</label>
            <input class="form-control" id="broj_gostiju" type="number" min="1" name="broj_gostiju" required value="{{ rezervacija.broj_gostiju if rezervacija else '' }}">
        </div>
        <div class="col-md-4">
            <label class="form-label" for="status">Status</label>
            <select class="form-select" id="status" name="status" required>
                <option value="odobrena" {% if rezervacija and rezervacija.status == 'odobrena' %}selected{% endif %}>Odobrena</option>
                <option value="nije odobrena" {% if (not rezervacija) or rezervacija.status == 'nije odobrena' %}selected{% endif %}>Nije odobrena</option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label" for="cijena_najma">Cijena najma (€)</label>
            <input class="form-control" id="cijena_najma" type="number" min="0" step="0.01" name="cijena_najma" required value="{{ rezervacija.cijena_najma if rezervacija else '' }}">
        </div>
        <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" type="submit">Spremi</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('rezervacije_index') }}">Odustani</a>
        </div>
    </form>
    {% endif %}
    </div>
</div>
<script>
    const selectSala = document.getElementById("sala_id");
    const cijenaInput = document.getElementById("cijena_najma");
    if (selectSala && cijenaInput && !cijenaInput.value) {
        const selected = selectSala.options[selectSala.selectedIndex];
        if (selected) {
            cijenaInput.value = selected.dataset.cijena || "";
        }
    }
    if (selectSala && cijenaInput) {
        selectSala.addEventListener("change", () => {
            const selected = selectSala.options[selectSala.selectedIndex];
            if (selected) {
                cijenaInput.value = selected.dataset.cijena || "";
            }
        });
    }
</script>
{% endblock %}
