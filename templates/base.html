<!doctype html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Wedding Hall Manager</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/96/wedding-rings.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #fff7fb;
        }

        .navbar-glass {
            background: white;
            border-bottom: 1px solid #f5cfe0;
        }

        .brand-logo {
            width: 32px;
            height: 32px;
        }

        .navbar .nav-link {
            color: #8a4c67;
            padding: 6px 12px;
            border-radius: 8px;
        }

        .navbar .nav-link:hover,
        .navbar .nav-link.active {
            background: #ffe7f1;
            color: #6f2f4b;
        }

        .card {
            border: 1px solid #f5d8e5;
            border-radius: 12px;
        }

        .card-soft {
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .table-soft {
            border-radius: 10px;
            overflow: hidden;
        }

        .table-soft thead th {
            background: #ffeef5;
            color: #7a3f58;
        }

        .table-hover > tbody > tr:hover > * {
            background: #fff6fa;
        }

        .btn-primary {
            background: #d96d95;
            border-color: #d96d95;
        }

        .btn-primary:hover {
            background: #c75b84;
            border-color: #c75b84;
        }

        .btn-outline-primary {
            color: #8d3557;
            border-color: #d9a4ba;
        }

        .btn-outline-primary:hover {
            background: #efbfd1;
            border-color: #efbfd1;
            color: #5a273d;
        }

        .alert {
            border-radius: 10px;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-glass">
        <div class="container">
            <a class="navbar-brand fw-semibold d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <img class="brand-logo" src="https://img.icons8.com/fluency/96/wedding-rings.png" alt="Wedding Hall Manager logo">
                <span>Wedding Hall Manager</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <div class="navbar-nav ms-auto gap-1">
                    <a class="nav-link {% if request.endpoint and request.endpoint.startswith('sale_') %}active{% endif %}" href="{{ url_for('sale_index') }}">Sale</a>
                    <a class="nav-link {% if request.endpoint and request.endpoint.startswith('rezervacije_') %}active{% endif %}" href="{{ url_for('rezervacije_index') }}">Rezervacije</a>
                    <a class="nav-link {% if request.endpoint == 'analitika' %}active{% endif %}" href="{{ url_for('analitika') }}">Analitika</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="container py-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert {% if category == 'success' %}alert-success{% else %}alert-danger{% endif %} mb-3" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
